<<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspection Freightliner 108SD</title>
    <style>
        :root { --primary: #1e40af; --secondary: #3b82f6; --danger: #dc2626; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f3f4f6; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .form-content { padding: 20px; }
        .section { margin-bottom: 20px; border: 1px solid #e5e7eb; border-radius: 10px; padding: 15px; background: #fff; }
        .section-title { font-weight: bold; margin-bottom: 12px; color: var(--primary); border-bottom: 2px solid #f3f4f6; padding-bottom: 5px; text-transform: uppercase; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #4b5563; }
        input[type="text"], input[type="date"], input[type="time"], textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .check-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        
        .sig-container { border: 2px dashed #d1d5db; background: #f9fafb; margin-top: 10px; border-radius: 8px; }
        canvas { width: 100%; height: 150px; touch-action: none; }
        .sig-buttons { display: flex; justify-content: space-between; padding: 8px; background: #eee; border-radius: 0 0 8px 8px; }
        
        .submit-btn { background: var(--primary); color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:active { transform: scale(0.98); background: var(--secondary); }
        .success { display: none; background: #d1fae5; color: #065f46; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 20px;">RONDE D'INSPECTION</h1>
        <p style="margin:5px 0 0; font-size: 14px; opacity: 0.9;">Freightliner 108SD - Déneigement</p>
    </div>

    <form action="https://formsubmit.co/Mjacquesperrier@gmail.com" method="POST" enctype="multipart/form-data" class="form-content">
        
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://ton-nom.github.io/inspection-camion/success.html">

        <div class="grid">
            <div><label>Opérateur</label><input type="text" name="Operateur" required></div>
            <div><label>Camion #</label><input type="text" name="Unite" required></div>
            <div><label>Date</label><input type="date" name="Date" id="dateInput" required></div>
            <div><label>Heure</label><input type="time" name="Heure" id="timeInput" required></div>
        </div>

        <div class="section">
            <div class="section-title">Points de vérification</div>
            <label class="check-item"><input type="checkbox" name="Verif_Ext" value="OK"> Extérieur (Fuites, Pneus, Lumières)</label>
            <label class="check-item"><input type="checkbox" name="Verif_DEF" value="OK"> Niveau DEF & Réservoirs d'air</label>
            <label class="check-item"><input type="checkbox" name="Verif_Equipement" value="OK"> Gratte & Épandeur (Epoke)</label>
            <label class="check-item"><input type="checkbox" name="Verif_Securite" value="OK"> Freins & Visibilité</label>
        </div>

        <div class="section">
            <div class="section-title">Photos & Notes</div>
            <textarea name="Commentaires" rows="3" placeholder="Notes ou défauts identifiés..."></textarea>
            <div style="margin-top:10px;">
                <label>Prendre une photo (défaut)</label>
                <input type="file" name="Photo_Defaut" accept="image/*" capture="environment">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Signature</div>
            <div class="sig-container">
                <canvas id="sig-canvas"></canvas>
            </div>
            <div class="sig-buttons">
                <button type="button" onclick="clearSig()" style="padding:5px 10px;">Effacer</button>
                <span style="font-size:11px; color: #666;">Signez ici</span>
            </div>
            <input type="hidden" name="Signature_Donnee" id="sig-data">
        </div>

        <button type="submit" class="submit-btn" onclick="saveSig()">ENVOYER LE RAPPORT</button>
    </form>
</div>

<script>
    // Heure et Date auto
    document.getElementById('dateInput').valueAsDate = new Date();
    document.getElementById('timeInput').value = new Date().toTimeString().slice(0,5);

    // Signature Canvas
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.onresize = resize; resize();

    canvas.addEventListener('mousedown', () => drawing = true);
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => drawing = false);
    canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });

    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.pageX) - rect.left;
        const y = (e.clientY || e.pageY) - rect.top;
        ctx.lineWidth = 2;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); }
    
    // Sauvegarder la signature avant envoi
    function saveSig() {
        const dataURL = canvas.toDataURL();
        document.getElementById('sig-data').value = "Signé électroniquement sur mobile";
    }
</script>

</body>
</html>
