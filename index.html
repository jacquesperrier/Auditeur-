<form action="https://formsubmit.co/VOTRE_COURRIEL@email.com" method="POST" enctype="multipart/form-data">
    
    <input type="hidden" name="_subject" value="Rapport d'Inspection Détaillé - Unité 108SD">
    <input type="hidden" name="_captcha" value="false">

    <fieldset>
        <legend>Identification</legend>
        <label>👤 Auditeur:</label>
        <input type="text" name="Auditeur" value="Perrier" required>

        <label>🚛 Unité:</label>
        <input type="text" name="Unite" value="108SD" required>
        
        <label>🛣️ Kilométrage (Odomètre):</label>
        <input type="number" name="Kilometrage" placeholder="ex: 125000" required>
    </fieldset>

    <fieldset>
        <legend>État du Véhicule</legend>
        
        <label>⛽ Niveau de Carburant:</label>
        <select name="Niveau_Carburant">
            <option value="100%">Plein (100%)</option>
            <option value="75%">3/4</option>
            <option value="50%">1/2</option>
            <option value="25%">1/4</option>
            <option value="Reserve">Réserve (À remplir !)</option>
        </select>

        <label>🔧 Vérif. Mécanique (Freins/Pneus):</label>
        <select name="Verif_Mecanique">
            <option value="OK">Tout est OK</option>
            <option value="A_SURVEILLER">À surveiller</option>
            <option value="URGENT">URGENT - Réparation requise</option>
        </select>

        <label>💡 Lumières & Gyrophares:</label>
        <select name="Lumieres">
            <option value="OK">Fonctionnels</option>
            <option value="DEFFECTUEUX">Défectueux</option>
        </select>

        <label>❄️ Système Epoke / Épandeur:</label>
        <select name="Systeme_Epoke">
            <option value="OK">Prêt au combat</option>
            <option value="PROBLEME">Problème technique</option>
            <option value="NON_APPLICABLE">N/A</option>
        </select>
    </fieldset>

    <fieldset>
        <legend>Rapport visuel</legend>
        <label>📸 Photo du tableau de bord ou bris:</label>
        <input type="file" name="Photo_Inspection" accept="image/*">

        <label>📝 Notes / Observations:</label>
        <textarea name="Notes" rows="3" placeholder="Ajoutez des détails ici..."></textarea>
    </fieldset>

    <button type="submit" style="background-color: #28a745; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer;">
        ✅ Envoyer l'inspection
    </button>
</form>
