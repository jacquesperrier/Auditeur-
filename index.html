<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspection Freightliner 108SD</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #1e40af; --secondary: #3b82f6; --bg: #f3f4f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .form-content { padding: 15px; }
        .section { margin-bottom: 15px; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: var(--primary); border-bottom: 2px solid var(--bg); font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input[type="text"], input[type="date"], input[type="time"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        input[type="checkbox"] { width: 22px; height: 22px; }
        canvas { width: 100%; height: 140px; border: 2px dashed #ccc; border-radius: 8px; background: #fafafa; touch-action: none; }
        .submit-btn { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 18px;">INSPECTION CAMION</h1>
        <p style="margin:5px 0 0; font-size: 13px;">Freightliner 108SD - Auditeur</p>
    </div>

    <form action="https://formsubmit.co/Mjacquesperrier@gmail.com" method="POST" enctype="multipart/form-data" class="form-content">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://jacquesperrier.github.io/Auditeur-/">

        <div class="grid">
            <div><label style="font-size:11px;">Nom</label><input type="text" name="Auditeur" required></div>
            <div><label style="font-size:11px;">Camion #</label><input type="text" name="Unite" value="108SD" required></div>
            <div><label style="font-size:11px;">Date</label><input type="date" name="Date" id="d"></div>
            <div><label style="font-size:11px;">Heure</label><input type="time" name="Heure" id="h"></div>
        </div>

        <div class="section">
            <div class="section-title">Points de vérification</div>
            <label class="check-item"><input type="checkbox" name="Verif_Ext" value="OK"> Extérieur & Pneus</label>
            <label class="check-item"><input type="checkbox" name="Verif_Fluides" value="OK"> Huile & DEF</label>
            <label class="check-item"><input type="checkbox" name="Verif_Epoke" value="OK"> Système Epoke / Gratte</label>
        </div>

        <div class="section">
            <div class="section-title">Anomalies & Photo</div>
            <textarea name="Notes" rows="3" placeholder="Notes éventuelles..."></textarea>
            <input type="file" name="Photo" accept="image/*" capture="environment" style="margin-top:10px; font-size:12px;">
        </div>

        <div class="section">
            <div class="section-title">Signature</div>
            <canvas id="sig-canvas"></canvas>
            <button type="button" onclick="clearCanvas()" style="margin-top:5px; font-size:11px;">Effacer la signature</button>
            <input type="hidden" name="Certification" value="Signé électroniquement">
        </div>

        <button type="submit" class="submit-btn">ENVOYER LE RAPPORT</button>
    </form>
</div>

<script>
    document.getElementById('d').valueAsDate = new Date();
    document.getElementById('h').value = new Date().toTimeString().slice(0,5);

    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.onresize = resize; resize();

    canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchend', () => drawing = false);
    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;
        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e40af';
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        e.preventDefault();
    }, {passive: false});

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); }
</script>

</body>
</html>
